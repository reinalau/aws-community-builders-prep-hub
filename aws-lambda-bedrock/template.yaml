AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Lambda de revisión de postulaciones AWS Community Builders (Amazon Bedrock Nova Lite),
  con rol de ejecución dedicado, permisos de Bedrock y retención de logs de 1 día.

Parameters:
  BedrockModelId:
    Type: String
    Default: "us.amazon.nova-lite-v1:0"
    Description: ID del modelo de Bedrock o perfil de inferencia cruzada (ej. us.amazon.nova-lite-v1:0 o amazon.nova-lite-v1:0)

  AllowedOrigin:
    Type: String
    Default: "https://aws-communitybuilders-laub.netlify.app"
    Description: Origen permitido para CORS en el Function URL

Resources:

  ReviewFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aws-community-builders-review-bedrock-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsWriteOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/aws-community-builders-review-bedrock*"
        - PolicyName: BedrockInvokeModelOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - "arn:aws:bedrock:*::foundation-model/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*"

  ReviewFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/aws-community-builders-review-bedrock
      RetentionInDays: 1

  ReviewFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: aws-community-builders-review-bedrock
      CodeUri: review/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 180
      MemorySize: 256
      Role: !GetAtt ReviewFunctionRole.Arn
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE

Outputs:
  ReviewFunctionUrl:
    Description: URL pública de la Lambda (usar como LAMBDA_REVIEW_URL en Netlify)
    Value: !GetAtt ReviewFunctionUrl.FunctionUrl

  ReviewFunctionArn:
    Description: ARN de la función Lambda
    Value: !GetAtt ReviewFunction.Arn
